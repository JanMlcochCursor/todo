<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="theme-toggle" class="theme-floating" type="button" aria-label="Toggle dark theme">
      Dark mode
    </button>
    <main class="app">
      <h1>Todo List</h1>
      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="Add a new task..."
          autocomplete="off"
          required
        />
        <button type="submit">Add</button>
      </form>

      <section class="todo-meta">
        <span id="items-left">0 items left</span>
        <div class="meta-actions">
          <button id="clear-completed" type="button">Clear completed</button>
        </div>
      </section>

      <ul id="todo-list" class="todo-list" aria-label="Todo list"></ul>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
